<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Szybki Quiz</title>
    <style>
      :root {
        --primary-color: #3b82f6;
        --primary-hover: #2563eb;
        --bg-color: #f8fafc;
        --card-bg: #ffffff;
        --text-color: #334155;
        --border-color: #e2e8f0;

        /* Nowoczesne, delikatne kolory dla odpowiedzi */
        --correct-bg: #f0fdf4;
        --correct-border: #22c55e;
        --correct-text: #166534;

        --incorrect-bg: #fef2f2;
        --incorrect-border: #ef4444;
        --incorrect-text: #991b1b;
      }

      body {
        font-family: "Inter", "Segoe UI", sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }

      .quiz-container {
        background-color: var(--card-bg);
        border-radius: 16px;
        box-shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.05),
          0 2px 4px -1px rgba(0, 0, 0, 0.03);
        width: 100%;
        max-width: 600px;
        padding: 32px;
        box-sizing: border-box;
        border: 1px solid var(--border-color);
      }

      .quiz-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        font-size: 0.9em;
        font-weight: 500;
        color: #64748b;
      }

      #question-text {
        font-size: 1.25em;
        font-weight: 600;
        margin-bottom: 24px;
        line-height: 1.5;
        color: #0f172a;
      }

      .options-container {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .option-btn {
        background-color: var(--card-bg);
        border: 2px solid var(--border-color);
        border-radius: 10px;
        padding: 16px 20px;
        font-size: 1em;
        cursor: pointer;
        text-align: left;
        transition: all 0.2s ease;
        color: var(--text-color);
        font-weight: 500;
      }

      .option-btn:hover:not(:disabled) {
        border-color: var(--primary-color);
        background-color: #eff6ff;
      }

      .option-btn:disabled {
        cursor: default;
      }

      /* Nowe style poprawnych/błędnych odpowiedzi */
      .option-btn.correct {
        background-color: var(--correct-bg);
        border-color: var(--correct-border);
        color: var(--correct-text);
      }

      .option-btn.incorrect {
        background-color: var(--incorrect-bg);
        border-color: var(--incorrect-border);
        color: var(--incorrect-text);
      }

      .next-btn {
        background-color: var(--primary-color);
        color: white;
        border: none;
        border-radius: 10px;
        padding: 14px 24px;
        font-size: 1em;
        cursor: pointer;
        margin-top: 28px;
        width: 100%;
        display: none;
        font-weight: 600;
        transition: background-color 0.2s;
      }

      .next-btn:hover {
        background-color: var(--primary-hover);
      }

      #results {
        text-align: center;
        display: none;
      }

      #score-text {
        font-size: 1.5em;
        font-weight: 600;
        margin-bottom: 24px;
        color: #0f172a;
      }
    </style>
  </head>
  <body>
    <div class="quiz-container">
      <div id="quiz-block">
        <div class="quiz-header">
          <span id="question-progress">Pytanie 1 / 3</span>
          <span id="score-tracker">Wynik: 0</span>
        </div>
        <div id="question-text">Tutaj pojawi się pytanie?</div>
        <div class="options-container" id="options-container"></div>
        <button class="next-btn" id="next-btn">Następne pytanie</button>
      </div>

      <div id="results">
        <h2>Koniec testu!</h2>
        <div id="score-text">Twój wynik: 0 / 0</div>
        <button class="next-btn" id="restart-btn" style="display: inline-block">
          Rozwiąż ponownie
        </button>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
